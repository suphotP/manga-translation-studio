# Grafana dashboard provisioning

apiVersion: 1

providers:
  - name: "Manga Editor"
    orgId: 1
    folder: "Manga Editor"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
