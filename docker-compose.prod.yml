name: manga-editor-prod

services:
  # ---- Infra tier ---------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manga_editor}
      POSTGRES_USER: ${POSTGRES_USER:-manga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-200}"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1536MB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}"
      - "-c"
      - "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-10min}"
      - "-c"
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-2GB}"
      - "-c"
      - "min_wal_size=${POSTGRES_MIN_WAL_SIZE:-256MB}"
      - "-c"
      - "wal_compression=${POSTGRES_WAL_COMPRESSION:-on}"
      - "-c"
      - "idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_SESSION_TIMEOUT:-60000}"
      - "-c"
      - "log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_STATEMENT:-1000}"
      - "-c"
      - "track_io_timing=${POSTGRES_TRACK_IO_TIMING:-on}"
    shm_size: ${POSTGRES_SHM_SIZE:-1gb}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    stop_grace_period: 90s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    stop_grace_period: 90s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
        mode: ingress
      - target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
        mode: ingress
      - target: 443
        published: ${HTTPS_PORT:-443}
        protocol: udp
        mode: ingress
    environment:
      APP_HOST: ${APP_HOST:-app.example.com}
      API_HOST: ${API_HOST:-api.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/builds:/builds:ro
      - caddy-prod-data:/data
      - caddy-prod-config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header=\"Host: $${APP_HOST}\" http://localhost/healthz >/dev/null 2>&1 || wget -qO- --header=\"Host: $${API_HOST}\" http://localhost/healthz >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 90s
    restart: unless-stopped

  # ---- App tier -----------------------------------------------------------
  migrate:
    image: manga-editor-api:${RELEASE_TAG:-prod}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: bun run db:migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-manga}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-manga_editor}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  # One-shot, deploy-time backfill (codex P0 — CSAM-laundering fix). The asset
  # serve gate FAILS CLOSED on a missing asset record (no on-demand grandfather),
  # so this registers a `passed` record for every state-referenced EXISTING image
  # object that predates the asset registry. Idempotent + safe to re-run. Needs the
  # project DATA volume (state.json enumeration) + the same storage/DB env as the
  # API so it reads the same objects + writes the same asset_records. Runs after
  # migrate and gates the API start so the gate never 403s a legit legacy image.
  backfill-assets:
    image: manga-editor-api:${RELEASE_TAG:-prod}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: bun run assets:backfill
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-manga}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-manga_editor}
      DATA_DIR: /app/data
      PROJECT_CATALOG_STORE: ${PROJECT_CATALOG_STORE:-postgres}
      PROJECT_CATALOG_FILE_FALLBACK_ENABLED: ${PROJECT_CATALOG_FILE_FALLBACK_ENABLED:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_ROOT: /app/data
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
    volumes:
      - api-prod-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  api:
    image: manga-editor-api:${RELEASE_TAG:-prod}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATA_DIR: /app/data
      DATABASE_URL: postgres://${POSTGRES_USER:-manga}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-manga_editor}
      REDIS_URL: redis://redis:6379
      WORKER_URL: ${WORKER_URL:-http://worker:8001}
      READINESS_REQUIRE_WORKER: ${READINESS_REQUIRE_WORKER:-false}
      READINESS_WORKER_DISABLED: ${READINESS_WORKER_DISABLED:-false}
      READINESS_REQUIRE_MIGRATIONS: ${READINESS_REQUIRE_MIGRATIONS:-true}
      READINESS_REQUIRE_OBJECT_STORAGE: ${READINESS_REQUIRE_OBJECT_STORAGE:-false}
      READINESS_OBJECT_STORAGE_DISABLED: ${READINESS_OBJECT_STORAGE_DISABLED:-false}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.example.com}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-true}
      API_MUTATION_AUTH_REQUIRED: ${API_MUTATION_AUTH_REQUIRED:-true}
      API_ORIGIN_GUARD_ENABLED: ${API_ORIGIN_GUARD_ENABLED:-true}
      API_CSRF_REQUIRED: ${API_CSRF_REQUIRED:-false}
      CSRF_TOKEN_TTL_SECONDS: ${CSRF_TOKEN_TTL_SECONDS:-28800}
      # Bot defense — Cloudflare Turnstile (see docs/DEPLOYMENT.md §2.7). The BACKEND
      # enforcement lives here: without these the API never verifies tokens, so a widget
      # built into the web bundle (VITE_TURNSTILE_SITE_KEY) would render but auth endpoints
      # would ignore it. SECURE-BY-DEFAULT: this defaults to `true` in production, so omitting
      # it makes the API boot-throw unless the secret + hostnames below are set (rather than
      # silently serving auth with no bot gate). Set TURNSTILE_ENABLED=false EXPLICITLY only if
      # you intentionally run prod behind another bot defense.
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-true}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_ALLOWED_HOSTNAMES: ${TURNSTILE_ALLOWED_HOSTNAMES:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_VERIFY_URL: ${TURNSTILE_VERIFY_URL:-}
      TURNSTILE_TOKEN_CACHE_KEY_PREFIX: ${TURNSTILE_TOKEN_CACHE_KEY_PREFIX:-}
      TURNSTILE_VERIFY_TIMEOUT_MS: ${TURNSTILE_VERIFY_TIMEOUT_MS:-}
      AUTH_SESSION_STORE: ${AUTH_SESSION_STORE:-redis}
      AUTH_SESSION_REDIS_KEY_PREFIX: ${AUTH_SESSION_REDIS_KEY_PREFIX:-manga-editor:auth}
      AUTH_USER_STORE: ${AUTH_USER_STORE:-postgres}
      # In prod there is no separate cron-worker — the api container runs the scheduler
      # (SCHEDULER_ENABLED defaults true when NODE_ENV=production) AND serves admin force-runs,
      # so the unverified-account-cleanup TTL must be here or both paths use the 3-day default.
      UNVERIFIED_ACCOUNT_MAX_AGE_DAYS: ${UNVERIFIED_ACCOUNT_MAX_AGE_DAYS:-3}
      UPLOAD_AUDIT_STORE: ${UPLOAD_AUDIT_STORE:-postgres}
      PROJECT_CATALOG_STORE: ${PROJECT_CATALOG_STORE:-postgres}
      PROJECT_CATALOG_FILE_FALLBACK_ENABLED: ${PROJECT_CATALOG_FILE_FALLBACK_ENABLED:-}
      USAGE_LEDGER_STORE: ${USAGE_LEDGER_STORE:-postgres}
      RATE_LIMIT_STORE: ${RATE_LIMIT_STORE:-redis}
      RATE_LIMIT_REDIS_KEY_PREFIX: ${RATE_LIMIT_REDIS_KEY_PREFIX:-manga-editor:rate-limit}
      RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-600}
      RATE_LIMIT_API_PER_HOUR: ${RATE_LIMIT_API_PER_HOUR:-12000}
      RATE_LIMIT_AUTH_LOGIN_PER_MINUTE: ${RATE_LIMIT_AUTH_LOGIN_PER_MINUTE:-10}
      RATE_LIMIT_AUTH_REGISTER_PER_MINUTE: ${RATE_LIMIT_AUTH_REGISTER_PER_MINUTE:-5}
      REGISTER_IP_RATE_LIMIT: ${REGISTER_IP_RATE_LIMIT:-30}
      RATE_LIMIT_AUTH_REFRESH_PER_MINUTE: ${RATE_LIMIT_AUTH_REFRESH_PER_MINUTE:-60}
      RATE_LIMIT_AUTH_SENSITIVE_PER_MINUTE: ${RATE_LIMIT_AUTH_SENSITIVE_PER_MINUTE:-10}
      RATE_LIMIT_PROJECT_WRITE_PER_MINUTE: ${RATE_LIMIT_PROJECT_WRITE_PER_MINUTE:-240}
      RATE_LIMIT_UPLOAD_PER_MINUTE: ${RATE_LIMIT_UPLOAD_PER_MINUTE:-20}
      RATE_LIMIT_UPLOAD_MB_UNITS_PER_MINUTE: ${RATE_LIMIT_UPLOAD_MB_UNITS_PER_MINUTE:-200}
      RATE_LIMIT_UPLOAD_PER_HOUR: ${RATE_LIMIT_UPLOAD_PER_HOUR:-300}
      RATE_LIMIT_IMAGE_READ_PER_MINUTE: ${RATE_LIMIT_IMAGE_READ_PER_MINUTE:-300}
      RATE_LIMIT_ASSET_TOKEN_PER_MINUTE: ${RATE_LIMIT_ASSET_TOKEN_PER_MINUTE:-120}
      RATE_LIMIT_AI_SUBMIT_PER_MINUTE: ${RATE_LIMIT_AI_SUBMIT_PER_MINUTE:-20}
      RATE_LIMIT_AI_SUBMIT_COST_UNITS_PER_MINUTE: ${RATE_LIMIT_AI_SUBMIT_COST_UNITS_PER_MINUTE:-80}
      RATE_LIMIT_AI_SUBMIT_PER_HOUR: ${RATE_LIMIT_AI_SUBMIT_PER_HOUR:-120}
      RATE_LIMIT_EXPORT_USAGE_PER_MINUTE: ${RATE_LIMIT_EXPORT_USAGE_PER_MINUTE:-60}
      RATE_LIMIT_EXPORT_USAGE_PER_HOUR: ${RATE_LIMIT_EXPORT_USAGE_PER_HOUR:-500}
      RATE_LIMIT_ADMIN_PER_MINUTE: ${RATE_LIMIT_ADMIN_PER_MINUTE:-60}
      AI_QUEUE_STORE: ${AI_QUEUE_STORE:-redis}
      AI_QUEUE_REDIS_KEY_PREFIX: ${AI_QUEUE_REDIS_KEY_PREFIX:-manga-editor:ai-queue}
      AI_QUEUE_PROCESSOR_ENABLED: ${AI_QUEUE_PROCESSOR_ENABLED:-true}
      AI_QUEUE_PROCESSOR_POLL_INTERVAL_MS: ${AI_QUEUE_PROCESSOR_POLL_INTERVAL_MS:-1000}
      AI_QUEUE_MAX_OPEN_JOBS: ${AI_QUEUE_MAX_OPEN_JOBS:-200}
      AI_QUEUE_MAX_PENDING_JOBS: ${AI_QUEUE_MAX_PENDING_JOBS:-150}
      AI_QUEUE_MAX_PROJECT_OPEN_JOBS: ${AI_QUEUE_MAX_PROJECT_OPEN_JOBS:-30}
      AI_QUEUE_MAX_PROJECT_PENDING_JOBS: ${AI_QUEUE_MAX_PROJECT_PENDING_JOBS:-20}
      AI_QUEUE_MAX_PROJECT_RESERVED_THB: ${AI_QUEUE_MAX_PROJECT_RESERVED_THB:-1000}
      AI_QUEUE_MAX_BUDGET_CLEAN_OPEN_JOBS: ${AI_QUEUE_MAX_BUDGET_CLEAN_OPEN_JOBS:-100}
      AI_QUEUE_MAX_CLEAN_PRO_OPEN_JOBS: ${AI_QUEUE_MAX_CLEAN_PRO_OPEN_JOBS:-60}
      AI_QUEUE_MAX_SFX_PRO_OPEN_JOBS: ${AI_QUEUE_MAX_SFX_PRO_OPEN_JOBS:-30}
      AI_QUEUE_RETRY_AFTER_SECONDS: ${AI_QUEUE_RETRY_AFTER_SECONDS:-30}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_ROOT: /app/data
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      ASSET_SIGNING_SECRET: ${ASSET_SIGNING_SECRET:?ASSET_SIGNING_SECRET is required}
      ASSET_SIGNED_URLS_ENFORCED: ${ASSET_SIGNED_URLS_ENFORCED:-}
      ASSET_CDN_PROXY_BASE_URL: ${ASSET_CDN_PROXY_BASE_URL:-}
      ASSET_ACCESS_TOKEN_TTL_SECONDS: ${ASSET_ACCESS_TOKEN_TTL_SECONDS:-300}
      ASSET_ACCESS_TOKEN_MAX_TTL_SECONDS: ${ASSET_ACCESS_TOKEN_MAX_TTL_SECONDS:-3600}
      ASSET_EGRESS_STORE: ${ASSET_EGRESS_STORE:-redis}
      ASSET_EGRESS_REDIS_KEY_PREFIX: ${ASSET_EGRESS_REDIS_KEY_PREFIX:-manga-editor:asset-egress}
      ASSET_EGRESS_WINDOW_MS: ${ASSET_EGRESS_WINDOW_MS:-3600000}
      ASSET_EGRESS_PROJECT_WINDOW_BYTES: ${ASSET_EGRESS_PROJECT_WINDOW_BYTES:-0}
      ASSET_EGRESS_LIMIT_ENFORCED: ${ASSET_EGRESS_LIMIT_ENFORCED:-false}
      WORKSPACE_PLAN_ID: ${WORKSPACE_PLAN_ID:-production}
      WORKSPACE_STORAGE_INCLUDED_BYTES: ${WORKSPACE_STORAGE_INCLUDED_BYTES:-2147483648}
      WORKSPACE_STORAGE_EXTRA_BYTES: ${WORKSPACE_STORAGE_EXTRA_BYTES:-0}
      WORKSPACE_STORAGE_QUOTA_ENFORCED: ${WORKSPACE_STORAGE_QUOTA_ENFORCED:-true}
      STORAGE_QUOTA_RESERVATION_STORE: ${STORAGE_QUOTA_RESERVATION_STORE:-redis}
      STORAGE_QUOTA_RESERVATION_TTL_MS: ${STORAGE_QUOTA_RESERVATION_TTL_MS:-900000}
      USAGE_QUOTA_ENFORCED: ${USAGE_QUOTA_ENFORCED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_IMAGES_ENABLED: ${OPENAI_IMAGES_ENABLED:-false}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
      OPENAI_IMAGE_DEFAULT_QUALITY: ${OPENAI_IMAGE_DEFAULT_QUALITY:-low}
      OPENAI_IMAGE_REQUEST_TIMEOUT_MS: ${OPENAI_IMAGE_REQUEST_TIMEOUT_MS:-300000}
      OPENAI_IMAGE_MAX_RESULT_MB: ${OPENAI_IMAGE_MAX_RESULT_MB:-25}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.1}
      GIT_SHA: ${GIT_SHA:-${RELEASE_TAG:-prod}}
      # Sentry release tag for release tracking / regression markers. Defaults to
      # GIT_SHA so every deploy is attributed even if SENTRY_RELEASE is unset.
      SENTRY_RELEASE: ${SENTRY_RELEASE:-${GIT_SHA:-${RELEASE_TAG:-prod}}}
      CSP_REPORT_URI: ${CSP_REPORT_URI:-}
      METRICS_BASIC_AUTH_USER: ${METRICS_BASIC_AUTH_USER:-}
      METRICS_BASIC_AUTH_PASS: ${METRICS_BASIC_AUTH_PASS:-}
      # Hosted metrics remote_write (Grafana Cloud / Better Stack). Prometheus does
      # the actual shipping; the backend reads these only to validate + surface the
      # config (see readMetricsRemoteWriteConfig). Secrets stay in the env.
      METRICS_REMOTE_WRITE_URL: ${METRICS_REMOTE_WRITE_URL:-}
      METRICS_REMOTE_WRITE_USERNAME: ${METRICS_REMOTE_WRITE_USERNAME:-}
      METRICS_REMOTE_WRITE_TOKEN: ${METRICS_REMOTE_WRITE_TOKEN:-}
    volumes:
      - api-prod-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      backfill-assets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 90s
    restart: unless-stopped
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        monitor: 60s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: start-first
        monitor: 60s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  web:
    image: manga-editor-web:${RELEASE_TAG:-prod}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # Vite inlines VITE_* at BUILD time, so these public client vars MUST be build args —
      # a runtime `environment:` value never reaches the compiled SvelteKit bundle. Set them
      # in the build env (e.g. a .env beside this compose file) before `docker compose build`.
      # The Turnstile site key falls back to the backend's TURNSTILE_SITE_KEY (same PUBLIC
      # key, used by the api service too) so a single env var lights up BOTH sides; set
      # VITE_TURNSTILE_SITE_KEY only to override. Empty → Turnstile widget off (safe default).
      args:
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-${TURNSTILE_SITE_KEY:-}}
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        # Frontend Sentry: falls back to the backend's SENTRY_DSN/GIT_SHA so the
        # single documented env lights up both sides; blank disables (fail-safe).
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-${SENTRY_DSN:-}}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-${SENTRY_ENVIRONMENT:-production}}
        VITE_GIT_SHA: ${VITE_GIT_SHA:-${GIT_SHA:-}}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4173
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4173/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 90s
    restart: unless-stopped
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        monitor: 60s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: start-first
        monitor: 60s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

volumes:
  postgres-prod-data:
  redis-prod-data:
  caddy-prod-data:
  caddy-prod-config:
  api-prod-data:
