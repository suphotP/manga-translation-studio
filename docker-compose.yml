services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: manga-frontend
    command: bun run dev -- --host 0.0.0.0
    environment:
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://backend:3001}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # One-shot, deploy-time backfill (codex P0 — CSAM-laundering fix). Mirrors the
  # prod wiring so dev/prod rollout stays consistent: the asset serve gate FAILS
  # CLOSED on a missing record, so this grandfathers a `passed` record for every
  # state-referenced EXISTING image object whose STORAGE timestamp predates the
  # registry cutoff (post-cutoff / aijob_provider_* objects are NEVER grandfathered).
  # Idempotent + safe to re-run; gates the backend start so the gate never 403s a
  # legit pre-registry legacy image after migrations.
  backfill-assets:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: manga-backfill-assets
    command: bun run assets:backfill
    environment:
      DATA_DIR: /app/data
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_ROOT: /app/data
      PROJECT_CATALOG_STORE: ${PROJECT_CATALOG_STORE:-postgres}
      PROJECT_CATALOG_FILE_FALLBACK_ENABLED: ${PROJECT_CATALOG_FILE_FALLBACK_ENABLED:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-manga}:${POSTGRES_PASSWORD:-manga_dev_password}@postgres:5432/${POSTGRES_DB:-manga_editor}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: manga-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      HOST: 0.0.0.0
      DATA_DIR: /app/data
      WORKER_URL: ${WORKER_URL:-http://worker:8001}
      READINESS_REQUIRE_WORKER: ${READINESS_REQUIRE_WORKER:-false}
      READINESS_WORKER_DISABLED: ${READINESS_WORKER_DISABLED:-false}
      # No localhost Compose default: an empty value lets the backend apply its
      # own default (https://app.example.com) instead of rendering every
      # transactional link as http://localhost:5173/... in production emails.
      # Set APP_URL in .env for local dev (http://localhost:5173) or a
      # self-hosted production domain.
      APP_URL: ${APP_URL:-}
      MAILER_PROVIDER: ${MAILER_PROVIDER:-null}
      MAILER_FROM: ${MAILER_FROM:-Comic Workspace <hello@send.example.com>}
      MAILER_REPLY_TO: ${MAILER_REPLY_TO:-support@example.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_DOMAIN: ${RESEND_DOMAIN:-send.example.com}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-32-chars}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      MAX_IMAGES_PER_UPLOAD: ${MAX_IMAGES_PER_UPLOAD:-1000}
      MAX_UPLOAD_BATCH_SIZE_MB: ${MAX_UPLOAD_BATCH_SIZE_MB:-500}
      MAX_IMAGES_PER_CHAPTER: ${MAX_IMAGES_PER_CHAPTER:-1000}
      MAX_CHAPTER_ORIGINAL_MB: ${MAX_CHAPTER_ORIGINAL_MB:-500}
      MIN_UPLOAD_IMAGE_WIDTH: ${MIN_UPLOAD_IMAGE_WIDTH:-64}
      MIN_UPLOAD_IMAGE_HEIGHT: ${MIN_UPLOAD_IMAGE_HEIGHT:-64}
      MAX_JSON_BODY_SIZE_KB: ${MAX_JSON_BODY_SIZE_KB:-1024}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_ROOT: /app/data
      WORKSPACE_STORAGE_INCLUDED_BYTES: ${WORKSPACE_STORAGE_INCLUDED_BYTES:-2147483648}
      WORKSPACE_STORAGE_EXTRA_BYTES: ${WORKSPACE_STORAGE_EXTRA_BYTES:-0}
      WORKSPACE_STORAGE_QUOTA_ENFORCED: ${WORKSPACE_STORAGE_QUOTA_ENFORCED:-true}
      STORAGE_QUOTA_RESERVATION_STORE: ${STORAGE_QUOTA_RESERVATION_STORE:-redis}
      STORAGE_QUOTA_RESERVATION_TTL_MS: ${STORAGE_QUOTA_RESERVATION_TTL_MS:-900000}
      WORKSPACE_PLAN_ID: ${WORKSPACE_PLAN_ID:-prototype}
      USAGE_QUOTA_ENFORCED: ${USAGE_QUOTA_ENFORCED:-true}
      USAGE_DAILY_AI_CREDIT_THB: ${USAGE_DAILY_AI_CREDIT_THB:-0}
      USAGE_MONTHLY_AI_CREDIT_THB: ${USAGE_MONTHLY_AI_CREDIT_THB:-0}
      USAGE_DAILY_UPLOAD_BYTES: ${USAGE_DAILY_UPLOAD_BYTES:-0}
      USAGE_MONTHLY_UPLOAD_BYTES: ${USAGE_MONTHLY_UPLOAD_BYTES:-0}
      USAGE_DAILY_EXPORT_BYTES: ${USAGE_DAILY_EXPORT_BYTES:-0}
      USAGE_MONTHLY_EXPORT_BYTES: ${USAGE_MONTHLY_EXPORT_BYTES:-0}
      USAGE_LEDGER_MAX_EVENTS: ${USAGE_LEDGER_MAX_EVENTS:-20000}
      ASSET_SIGNING_SECRET: ${ASSET_SIGNING_SECRET:-local-asset-signing-secret-change-me-32-chars}
      ASSET_SIGNED_URLS_ENFORCED: ${ASSET_SIGNED_URLS_ENFORCED:-}
      ASSET_CDN_PROXY_BASE_URL: ${ASSET_CDN_PROXY_BASE_URL:-}
      ASSET_ACCESS_TOKEN_TTL_SECONDS: ${ASSET_ACCESS_TOKEN_TTL_SECONDS:-300}
      ASSET_ACCESS_TOKEN_MAX_TTL_SECONDS: ${ASSET_ACCESS_TOKEN_MAX_TTL_SECONDS:-3600}
      ASSET_EGRESS_STORE: ${ASSET_EGRESS_STORE:-redis}
      ASSET_EGRESS_REDIS_KEY_PREFIX: ${ASSET_EGRESS_REDIS_KEY_PREFIX:-manga-editor:asset-egress}
      ASSET_EGRESS_WINDOW_MS: ${ASSET_EGRESS_WINDOW_MS:-3600000}
      ASSET_EGRESS_PROJECT_WINDOW_BYTES: ${ASSET_EGRESS_PROJECT_WINDOW_BYTES:-0}
      ASSET_EGRESS_LIMIT_ENFORCED: ${ASSET_EGRESS_LIMIT_ENFORCED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AUTH_SESSION_STORE: ${AUTH_SESSION_STORE:-redis}
      AUTH_SESSION_REDIS_KEY_PREFIX: ${AUTH_SESSION_REDIS_KEY_PREFIX:-manga-editor:auth}
      AUTH_USER_STORE: ${AUTH_USER_STORE:-file}
      # The admin cron endpoint lazily builds a CronScheduler in THIS backend process for
      # manual force-runs, so the unverified-account-cleanup TTL must be visible here too —
      # not just on cron-worker — or an admin-triggered run uses the built-in 3-day default.
      UNVERIFIED_ACCOUNT_MAX_AGE_DAYS: ${UNVERIFIED_ACCOUNT_MAX_AGE_DAYS:-3}
      UPLOAD_AUDIT_STORE: ${UPLOAD_AUDIT_STORE:-postgres}
      PROJECT_CATALOG_STORE: ${PROJECT_CATALOG_STORE:-postgres}
      PROJECT_CATALOG_FILE_FALLBACK_ENABLED: ${PROJECT_CATALOG_FILE_FALLBACK_ENABLED:-}
      USAGE_LEDGER_STORE: ${USAGE_LEDGER_STORE:-file}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-}
      API_MUTATION_AUTH_REQUIRED: ${API_MUTATION_AUTH_REQUIRED:-}
      API_ORIGIN_GUARD_ENABLED: ${API_ORIGIN_GUARD_ENABLED:-}
      API_CSRF_REQUIRED: ${API_CSRF_REQUIRED:-}
      CSRF_TOKEN_TTL_SECONDS: ${CSRF_TOKEN_TTL_SECONDS:-28800}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      RATE_LIMIT_STORE: ${RATE_LIMIT_STORE:-redis}
      RATE_LIMIT_REDIS_KEY_PREFIX: ${RATE_LIMIT_REDIS_KEY_PREFIX:-manga-editor:rate-limit}
      AI_QUEUE_STORE: ${AI_QUEUE_STORE:-redis}
      AI_QUEUE_REDIS_KEY_PREFIX: ${AI_QUEUE_REDIS_KEY_PREFIX:-manga-editor:ai-queue}
      RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-600}
      RATE_LIMIT_API_PER_HOUR: ${RATE_LIMIT_API_PER_HOUR:-12000}
      RATE_LIMIT_AUTH_LOGIN_PER_MINUTE: ${RATE_LIMIT_AUTH_LOGIN_PER_MINUTE:-10}
      RATE_LIMIT_AUTH_REGISTER_PER_MINUTE: ${RATE_LIMIT_AUTH_REGISTER_PER_MINUTE:-5}
      REGISTER_IP_RATE_LIMIT: ${REGISTER_IP_RATE_LIMIT:-30}
      RATE_LIMIT_AUTH_REFRESH_PER_MINUTE: ${RATE_LIMIT_AUTH_REFRESH_PER_MINUTE:-60}
      RATE_LIMIT_AUTH_SENSITIVE_PER_MINUTE: ${RATE_LIMIT_AUTH_SENSITIVE_PER_MINUTE:-10}
      RATE_LIMIT_PROJECT_WRITE_PER_MINUTE: ${RATE_LIMIT_PROJECT_WRITE_PER_MINUTE:-240}
      RATE_LIMIT_UPLOAD_PER_MINUTE: ${RATE_LIMIT_UPLOAD_PER_MINUTE:-20}
      RATE_LIMIT_UPLOAD_MB_UNITS_PER_MINUTE: ${RATE_LIMIT_UPLOAD_MB_UNITS_PER_MINUTE:-200}
      RATE_LIMIT_UPLOAD_PER_HOUR: ${RATE_LIMIT_UPLOAD_PER_HOUR:-300}
      RATE_LIMIT_IMAGE_READ_PER_MINUTE: ${RATE_LIMIT_IMAGE_READ_PER_MINUTE:-300}
      RATE_LIMIT_ASSET_TOKEN_PER_MINUTE: ${RATE_LIMIT_ASSET_TOKEN_PER_MINUTE:-120}
      RATE_LIMIT_AI_SUBMIT_PER_MINUTE: ${RATE_LIMIT_AI_SUBMIT_PER_MINUTE:-20}
      RATE_LIMIT_AI_SUBMIT_COST_UNITS_PER_MINUTE: ${RATE_LIMIT_AI_SUBMIT_COST_UNITS_PER_MINUTE:-80}
      RATE_LIMIT_AI_SUBMIT_PER_HOUR: ${RATE_LIMIT_AI_SUBMIT_PER_HOUR:-120}
      RATE_LIMIT_EXPORT_USAGE_PER_MINUTE: ${RATE_LIMIT_EXPORT_USAGE_PER_MINUTE:-60}
      RATE_LIMIT_EXPORT_USAGE_PER_HOUR: ${RATE_LIMIT_EXPORT_USAGE_PER_HOUR:-500}
      RATE_LIMIT_ADMIN_PER_MINUTE: ${RATE_LIMIT_ADMIN_PER_MINUTE:-60}
      AI_QUEUE_PROCESSOR_ENABLED: ${AI_QUEUE_PROCESSOR_ENABLED:-true}
      AI_QUEUE_PROCESSOR_POLL_INTERVAL_MS: ${AI_QUEUE_PROCESSOR_POLL_INTERVAL_MS:-1000}
      AI_REQUIRE_ASSET_REGISTRY_FOR_AI: ${AI_REQUIRE_ASSET_REGISTRY_FOR_AI:-}
      READINESS_DATABASE_TIMEOUT_MS: ${READINESS_DATABASE_TIMEOUT_MS:-1000}
      READINESS_DATABASE_DISABLED: ${READINESS_DATABASE_DISABLED:-false}
      READINESS_REQUIRE_MIGRATIONS: ${READINESS_REQUIRE_MIGRATIONS:-true}
      READINESS_REQUIRE_OBJECT_STORAGE: ${READINESS_REQUIRE_OBJECT_STORAGE:-false}
      READINESS_OBJECT_STORAGE_DISABLED: ${READINESS_OBJECT_STORAGE_DISABLED:-false}
      READINESS_OBJECT_STORAGE_TIMEOUT_MS: ${READINESS_OBJECT_STORAGE_TIMEOUT_MS:-1000}
      AI_QUEUE_MAX_OPEN_JOBS: ${AI_QUEUE_MAX_OPEN_JOBS:-200}
      AI_QUEUE_MAX_PENDING_JOBS: ${AI_QUEUE_MAX_PENDING_JOBS:-150}
      AI_QUEUE_MAX_PROJECT_OPEN_JOBS: ${AI_QUEUE_MAX_PROJECT_OPEN_JOBS:-30}
      AI_QUEUE_MAX_PROJECT_PENDING_JOBS: ${AI_QUEUE_MAX_PROJECT_PENDING_JOBS:-20}
      AI_QUEUE_MAX_PROJECT_RESERVED_THB: ${AI_QUEUE_MAX_PROJECT_RESERVED_THB:-1000}
      AI_QUEUE_MAX_BUDGET_CLEAN_OPEN_JOBS: ${AI_QUEUE_MAX_BUDGET_CLEAN_OPEN_JOBS:-100}
      AI_QUEUE_MAX_CLEAN_PRO_OPEN_JOBS: ${AI_QUEUE_MAX_CLEAN_PRO_OPEN_JOBS:-60}
      AI_QUEUE_MAX_SFX_PRO_OPEN_JOBS: ${AI_QUEUE_MAX_SFX_PRO_OPEN_JOBS:-30}
      AI_QUEUE_RETRY_AFTER_SECONDS: ${AI_QUEUE_RETRY_AFTER_SECONDS:-30}
      READINESS_REDIS_TIMEOUT_MS: ${READINESS_REDIS_TIMEOUT_MS:-1000}
      DATABASE_URL: postgres://${POSTGRES_USER:-manga}:${POSTGRES_PASSWORD:-manga_dev_password}@postgres:5432/${POSTGRES_DB:-manga_editor}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_IMAGES_ENABLED: ${OPENAI_IMAGES_ENABLED:-false}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
      OPENAI_IMAGE_DEFAULT_QUALITY: ${OPENAI_IMAGE_DEFAULT_QUALITY:-low}
      OPENAI_IMAGE_REQUEST_TIMEOUT_MS: ${OPENAI_IMAGE_REQUEST_TIMEOUT_MS:-300000}
      OPENAI_IMAGE_MAX_RESULT_MB: ${OPENAI_IMAGE_MAX_RESULT_MB:-25}
      OPENAI_MODERATION_ENABLED: ${OPENAI_MODERATION_ENABLED:-}
      OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      OPENAI_MODERATION_RULESET_VERSION: ${OPENAI_MODERATION_RULESET_VERSION:-1.0}
      OPENAI_MODERATION_THRESHOLDS_JSON: ${OPENAI_MODERATION_THRESHOLDS_JSON:-}
      OPENAI_MODERATION_FAIL_OPEN: ${OPENAI_MODERATION_FAIL_OPEN:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      backfill-assets:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: manga-migrate
    command: bun run db:migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-manga}:${POSTGRES_PASSWORD:-manga_dev_password}@postgres:5432/${POSTGRES_DB:-manga_editor}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  cron-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: manga-cron-worker
    command: bun run cron:worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_POLL_INTERVAL_MS: ${SCHEDULER_POLL_INTERVAL_MS:-60000}
      # Retention/cleanup knobs the scheduler reads from its own process.env.
      # Must be forwarded here or Compose-run audit/export/credit cleanup
      # silently uses the built-in defaults regardless of operator .env config.
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
      DRAFT_EXPORT_TTL_HOURS: ${DRAFT_EXPORT_TTL_HOURS:-24}
      AI_RESERVATION_ABANDON_AFTER_DAYS: ${AI_RESERVATION_ABANDON_AFTER_DAYS:-7}
      # unverified-account-cleanup TTL: hard-delete abandoned, never-verified local
      # sign-ups older than this. Forwarded here or the override silently no-ops (the
      # scheduler reads it straight from process.env).
      UNVERIFIED_ACCOUNT_MAX_AGE_DAYS: ${UNVERIFIED_ACCOUNT_MAX_AGE_DAYS:-3}
      # monthly-credit-reset scans usage_events in Postgres, so the cron worker
      # must use the same ledger store as the API. Keep this in sync with the
      # backend service's USAGE_LEDGER_STORE; the credit-reset job only sees
      # reservations the API actually persisted to Postgres.
      USAGE_LEDGER_STORE: ${USAGE_LEDGER_STORE:-file}
      # unverified-account-cleanup revokes each deleted account's sessions via
      # authSessionStore, which must point at the SAME store the API issued them in
      # (Redis here). Without these the worker's session store defaults to file mode and
      # revokeUserSessions() silently no-ops against the API's Redis sessions. Keep in sync
      # with the backend service's session config.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AUTH_SESSION_STORE: ${AUTH_SESSION_STORE:-redis}
      AUTH_SESSION_REDIS_KEY_PREFIX: ${AUTH_SESSION_REDIS_KEY_PREFIX:-manga-editor:auth}
      DATABASE_URL: postgres://${POSTGRES_USER:-manga}:${POSTGRES_PASSWORD:-manga_dev_password}@postgres:5432/${POSTGRES_DB:-manga_editor}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: manga-worker
    environment:
      WORKER_ACCOUNTS_DIR: /app/worker/accounts
    ports:
      - "8001:8001"
    volumes:
      - ./backend/worker/accounts:/app/worker/accounts:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: manga-postgres
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-100}"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-768MB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}"
      - "-c"
      - "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-10min}"
      - "-c"
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-1GB}"
      - "-c"
      - "min_wal_size=${POSTGRES_MIN_WAL_SIZE:-128MB}"
      - "-c"
      - "wal_compression=${POSTGRES_WAL_COMPRESSION:-on}"
      - "-c"
      - "idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_SESSION_TIMEOUT:-60000}"
      - "-c"
      - "log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_STATEMENT:-1000}"
      - "-c"
      - "track_io_timing=${POSTGRES_TRACK_IO_TIMING:-on}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manga_editor}
      POSTGRES_USER: ${POSTGRES_USER:-manga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manga_dev_password}
    shm_size: ${POSTGRES_SHM_SIZE:-1gb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    stop_grace_period: ${POSTGRES_STOP_GRACE_PERIOD:-60s}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: manga-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  object-storage:
    image: quay.io/minio/minio:latest
    container_name: manga-object-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-manga}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-manga_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  object-storage-init:
    image: quay.io/minio/mc:latest
    container_name: manga-object-storage-init
    depends_on:
      - object-storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-manga}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-manga_dev_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-manga-assets}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://object-storage:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set none local/$${MINIO_BUCKET};
      "
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: manga-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      # Production paging rules (infra/alerts/) mounted alongside the dev rules.
      - ./infra/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    profiles: ["observability"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: manga-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles: ["observability"]
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: manga-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    profiles: ["observability"]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: manga-alertmanager
    ports:
      - "9093:9093"
    environment:
      # Notification secrets are env-driven; never baked into the config file.
      # Alertmanager v0.28 has NO runtime env-expansion flag, so the entrypoint
      # writes these to /run/secrets/* and config.yml reads them via the supported
      # *_file fields (slack_api_url_file / routing_key_file).
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-}
    volumes:
      - ./observability/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager-data:/alertmanager
    # Render env secrets into files (no env-expansion flag exists in v0.28), then
    # exec the real binary. amtool/alertmanager read them via *_file config fields.
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        set -eu
        mkdir -p /run/secrets
        printf '%s' "${SLACK_WEBHOOK_URL:-}" > /run/secrets/slack_api_url
        printf '%s' "${PAGERDUTY_ROUTING_KEY:-}" > /run/secrets/pagerduty_routing_key
        exec /bin/alertmanager \
          --config.file=/etc/alertmanager/config.yml \
          --storage.path=/alertmanager
    profiles: ["observability"]
    restart: unless-stopped

volumes:
  frontend-node-modules:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
